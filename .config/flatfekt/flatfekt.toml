# flatfekt control-pane configuration
#
# This file is intended to centralize operational decisions, tuning knobs, feature flags,
# and policy choices. Defaults exist, but explicit configuration is preferred.

[app]
# Optional display name (used for logs / UI labels).
name = "flatfekt"

# Operational mode: "dev" or "prod".
# - dev: extra diagnostics, run-scoped log files, caching conveniences
# - prod: minimal diagnostics, no per-run file logs by default
mode = "dev"

# Entrypoint scene file (TOML).
scene_path = "scenes/demo.toml"

# Root directory for resolving asset paths (images/fonts/etc.).
assets_dir = "assets"

[platform]
# Default target graphics environment for this project.
# Supported values: "wayland" (default) or "x11" (opt-in).
unix_backend = "wayland"

[render]
# This project requires Vulkan and fails fast if no Vulkan adapter is available.
backend = "vulkan"

[render.effects]
# Enable global post-processing effects and compositing.
enabled = false

# Select which `scene.effects[].id` is active globally.
# global_effect_id = "grayscale"

[render.effects.render_to_texture]
# If enabled, render the scene to an offscreen texture before presenting.
enabled = true

# Resolution strategy: "window" (recommended) or "fixed" (planned).
mode = "window"

# Scale factor applied to the target resolution (1.0 = full size).
scale = 1.0

[logging]
# One of: trace, debug, info, warn, error
level = "info"

# Optional: override with a full tracing filter string, e.g.:
# filter = "info,flatfekt_runtime=debug,wgpu=warn"
# filter = "debug"

[features]
# Enable an embedded control GUI (egui). When enabled, a small panel provides
# basic playback controls and debug toggles.
ui_egui = true

# Enable developer inspector surfaces (bevy-inspector-egui). This is still gated
# by per-scene policy.
inspector_egui = true

# (planned) hot reload support for config/scene files.
hot_reload = false

[runtime.timeline]
# Enable deterministic-ish timeline stepping. When enabled, the runtime advances a
# `TimelineClock` using a fixed dt, with a catch-up cap per frame.
enabled = true
deterministic = true
fixed_dt_secs = 0.016666667
max_catchup_steps = 4

# Optional: restrict which timeline event tracks run.
# enabled_tracks = ["main", "camera"]

[runtime.hot_reload]
# Debounce changes before attempting reload.
debounce_ms = 250

# If true, reload errors are logged and the app keeps running. If false, the app exits.
warn_and_continue = true

[assets.hot_reload]
# When runtime hot reload is enabled, also reload assets through Bevy's AssetServer
# when watched asset files change (images, fonts, wgsl).
enabled = true
debounce_ms = 250
warn_and_continue = true

[simulation]
# Simulation stepping scaffold (separate from timeline).
enabled = false
deterministic = true
fixed_dt_secs = 0.016666667
max_catchup_steps = 4
seed = 0
playing = true
